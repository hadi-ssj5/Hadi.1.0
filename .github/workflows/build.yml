name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip ChannelApp_v2.1_Updated.zip

      - name: Grant execute permission
        run: chmod +x "ChannelApp_v2.1_Project/Channel app 2.0/gradlew"

      - name: Build APK
        run: |
          cd "ChannelApp_v2.1_Project/Channel app 2.0"
          ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: ChannelFinder-APK
          path: "ChannelApp_v2.1_Project/Channel app 2.0/app/build/outputs/apk/debug/app-debug.apk"
